name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: logic2byte/gym-biometric-server:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: env
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/"

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        env:
          ENV_CONTENT: ${{ vars.ENV }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ENV_CONTENT
          script: |
            echo "Updating docker-compose.yml..."
            if [ -f "docker-compose.yml" ] && [ ! -L "docker-compose.yml" ]; then
              mv docker-compose.yml docker-compose.yml.bak || true
            fi
            mv docker-compose.prod.yml docker-compose.yml

            echo "Creating .env file from GitHub Environment variables..."
            echo "$ENV_CONTENT" > .env
            chmod 600 .env

            echo "Stopping and removing old containers..."
            docker stop gym-biometric-server || true
            docker rm gym-biometric-server || true
            docker-compose down || true
            
            echo "Pulling latest Docker images..."
            docker-compose pull
            
            echo "Starting services..."
            docker-compose up -d --force-recreate
