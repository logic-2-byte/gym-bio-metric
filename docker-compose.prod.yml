version: '3.8'

services:
  app:
    image: logic2byte/gym-biometric-server:latest
    container_name: gym-biometric-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - gym-network

networks:
  gym-network:
    external: true
    name: logic2bytes_gym-network
